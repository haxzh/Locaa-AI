services:
  - type: web
    name: locaa-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: locaa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: locaa-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: locaa-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: locaa-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STABILITY_API_KEY
        sync: false
      - key: STABILITY_IMAGE_ENGINE
        value: stable-diffusion-xl-1024-v1-0
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_VIDEO_MODEL
        value: anotherjesse/zeroscope-v2
      - key: YOUTUBE_API_KEY
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: noreply@locaaai.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false

  - type: web
    name: locaa-web
    env: static
    rootDir: frontend
    buildCommand: npm ci ; npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: locaa-redis
    ipAllowList: []
    plan: free


databases:
  - name: locaa-postgres
    plan: free
    databaseName: locaa_ai
    user: locaa_ai
